<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxentia | Immersive AI</title>
  
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-dark.css">
  
  <!-- Main Styles -->
  <link rel="stylesheet" href="static/styles/main.css">
</head>
<body>

  <!-- 1. Floating Navigation Rail (VisionOS Style) -->
  <nav class="floating-rail">
    <button class="rail-btn" title="Calendar"><span class="material-symbols-outlined">calendar_today</span></button>
    <button class="rail-btn" title="Analytics"><span class="material-symbols-outlined">analytics</span></button>
    <div style="flex: 1;"></div>
    <button class="rail-btn active" id="settingsBtn" title="Configuration"><span class="material-symbols-outlined">settings</span></button>
  </nav>

  <!-- 2. Main Avatar Spotlight Scene -->
  <main class="main-scene" id="mainLayout">
    <canvas id="scene"></canvas>
    
    <!-- Elegant Persona Header -->
    <div class="persona-status">
      <div class="status-dot"></div>
      <span class="persona-name">Voxentia Premium</span>
      <span class="material-symbols-outlined" style="font-size: 16px; color: var(--text-dim);">verified</span>
    </div>
  </main>

  <!-- 3. Premium Chat Area -->
  <aside class="chat-container">
    <div id="history" class="chat-history markdown-body">
      <!-- Messages injected via JS -->
    </div>

    <!-- Floating Input Wrapper -->
    <div class="chat-input-wrapper">
      <button class="rail-btn" id="uploadBtn" style="width: 32px; height: 32px;"><span class="material-symbols-outlined">add</span></button>
      <input type="text" id="textInput" placeholder="Sprechen oder schreiben...">
      <button class="send-btn-circle" id="sendBtn">
        <span class="material-symbols-outlined">arrow_upward</span>
      </button>
    </div>
  </aside>

  <!-- Settings Modal (Glassmorphism) -->
  <div id="settings-panel" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px);">
    <div style="background: #111; border: 1px solid var(--glass-border); padding: 32px; border-radius: 32px; width: 400px; box-shadow: var(--shadow-soft);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3>Konfiguration</h3>
        <button id="closeSettingsBtn" style="background: transparent; border: none; color: white; cursor: pointer;"><span class="material-symbols-outlined">close</span></button>
      </div>
      
      <div style="display: flex; flex-direction: column; gap: 20px;">
        <div>
          <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; color: #888;">Sprache</label>
          <select id="langSelect" style="width: 100%; background: #222; color: white; border: 1px solid #333; padding: 12px; border-radius: 12px;">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>
        <div>
          <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; color: #888;">Stimme</label>
          <select id="speakerSelect" style="width: 100%; background: #222; color: white; border: 1px solid #333; padding: 12px; border-radius: 12px;"></select>
        </div>
        <button id="testSoundBtn" style="background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer;">Audio Test</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" class="hidden">

  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <script type="module" src="static/main.js?v=5.5"></script>
</body>
</html>
