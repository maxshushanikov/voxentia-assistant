<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxentia: AI Digital Assistant</title>
  <meta name="description"
    content="Voxentia — Your next-generation local AI digital assistant with voice, vision and avatar.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./static/styles/main.css">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">

  <!-- Markdown + Syntax Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
  <div id="app">

    <!-- ====================================================
         START OVERLAY
         ==================================================== -->
    <div id="start-overlay">
      <div class="start-card">
        <div class="start-logo">
          <span class="material-symbols-outlined">psychology</span>
        </div>
        <h1 id="overlay-title">Voxentia</h1>
        <p id="overlay-desc">Your Next-Generation AI Digital Assistant</p>

        <div class="language-selector">
          <button class="start-lang-btn active" data-lang="en">English</button>
          <button class="start-lang-btn" data-lang="de">Deutsch</button>
          <button class="start-lang-btn" data-lang="ru">Русский</button>
        </div>

        <button id="startBtn">
          <span class="material-symbols-outlined">power_settings_new</span>
          Initialize System
        </button>
      </div>
    </div>

    <!-- ====================================================
         MAIN LAYOUT
         ==================================================== -->
    <div class="main-container hidden" id="mainLayout">

      <!-- ================================================
           Navigation Rail (left) — Responsive
           ================================================ -->
      <nav class="md-nav-rail" aria-label="Main navigation">

        <!-- Segment 1: Input / Actions -->
        <div class="rail-segment">
          <button id="backBtn" class="rail-item" title="Home">
            <span class="material-symbols-outlined">home</span>
          </button>
          <button id="uploadBtn" class="rail-item" title="Upload PDF">
            <span class="material-symbols-outlined">description</span>
          </button>
          <input type="file" id="fileInput" accept=".pdf" style="display:none;">
          <button id="callBtn" class="rail-item" title="Video Call">
            <span class="material-symbols-outlined">video_call</span>
          </button>
          <button id="webcamBtn" class="rail-item" title="Toggle Camera">
            <span class="material-symbols-outlined">photo_camera</span>
          </button>
        </div>

        <!-- Spacer Divider (pushes segments apart) -->
        <div class="rail-divider"></div>

        <!-- Segment 2: Settings -->
        <div class="rail-segment">
          <button id="testSoundBtn" class="rail-item" title="Test Audio">
            <span class="material-symbols-outlined">volume_up</span>
          </button>
        </div>

      </nav>

      <!-- Scene Area -->
      <div class="content-area">

        <!-- Progress bar (Moved here, no header) -->
        <div id="topProgress" class="md-linear-progress hidden" style="top:0; border-radius: 0;">
          <div class="progress-bar"></div>
        </div>

        <!-- Recording Indicator -->
        <div id="recordingStatus" class="recording-status" aria-live="polite">
          <span class="dot"></span>
          <span id="recording-text">Listening…</span>
        </div>

        <!-- 3D Scene -->
        <div id="scene-container">
          <canvas id="scene"></canvas>
          <div id="webcam-container" class="hidden">
            <video id="webcam-preview" autoplay playsinline></video>
          </div>
        </div>

      </div><!-- /content-area -->

      <!-- ================================================
           Plugin Panel (Dynamic)
           ================================================ -->
      <div id="plugin-container" class="plugin-panel hidden" aria-label="Plugin content">
        <div class="plugin-header">
           <span class="material-symbols-outlined plugin-icon">extension</span>
           <h3 class="plugin-title">Plugin-Inhalt</h3>
           <button class="close-plugin-btn" onclick="document.getElementById('plugin-container').classList.add('hidden')">
             <span class="material-symbols-outlined">close</span>
           </button>
        </div>
        <div id="plugin-content" class="plugin-body">
           <!-- Dynamically populated by plugins -->
        </div>
      </div>

      <!-- ================================================
           Chat Sidebar
           ================================================ -->
      <aside class="sidebar" aria-label="Chat">

        <!-- Header: Title | Speaker | Language | Status -->
        <div class="sidebar-header">
          <h2 id="chat-title">Chat</h2>
          
          <div class="sidebar-controls">
            <!-- Speaker Select -->
            <div class="md-select-field sidebar-speaker-field">
              <span class="prefix">🗣️</span>
              <select id="speakerSelect" title="Voice">
                <option value="baya">Baya</option>
                <option value="kseniya">Kseniya</option>
                <option value="eugene">Eugene</option>
                <option value="aidar">Aidar</option>
              </select>
            </div>

            <!-- Language Select -->
            <div class="md-select-field sidebar-lang-field">
              <span class="prefix">🌐</span>
              <select id="langSelect" title="Language">
                <option value="en">EN</option>
                <option value="de">DE</option>
                <option value="ru">RU</option>
              </select>
            </div>
          </div>

          <span id="statusIndicator" class="status-badge ready">
            <span class="dot"></span>
            <span class="label">Ready</span>
          </span>
        </div>

        <div class="chat-container">
          <!-- Messages -->
          <div id="history" role="log" aria-live="polite" aria-label="Chat messages">
            <!-- Populated by Chat.js -->
          </div>

          <!-- Active Document Indicator -->
          <div id="activeDocIndicator" class="active-doc-indicator hidden">
            <span class="material-symbols-outlined">description</span>
            <span class="doc-name">No document loaded</span>
          </div>

          <!-- Input -->
          <div class="input-area">
            <!-- Persona Row (Dropdown + Search Chip) -->
            <div class="input-persona-row">
              <div class="md-select-field persona-select-field">
                <span class="prefix">🎭</span>
                <select id="personaSelect" title="Persona">
                  <option value="professional" id="opt-pers-professional">Expert</option>
                  <option value="friendly" id="opt-pers-friendly">Friendly</option>
                  <option value="academic" id="opt-pers-academic">Tutor</option>
                </select>
              </div>

              <button class="chip tool-chip" id="toggleSearch" title="Toggle Web Search">
                <span class="material-symbols-outlined">search</span>
                <span class="label">Search</span>
              </button>
            </div>

            <!-- Input box -->
            <div class="input-box">
              <button class="input-icon-btn" id="inputMicBtn" title="Voice input">
                <span class="material-symbols-outlined">mic</span>
              </button>
              <input type="text" id="textInput" placeholder="Message Voxentia…" autocomplete="off"
                aria-label="Message input">
              <button class="input-icon-btn" id="inputAttachBtn" title="Attach file">
                <span class="material-symbols-outlined">attach_file</span>
              </button>
              <button id="sendBtn" title="Send message" aria-label="Send">
                <span class="material-symbols-outlined">send</span>
              </button>
            </div>
            <p class="input-hint">Voxentia can make mistakes. Verify important information.</p>
          </div>
        </div>
      </aside>

    </div><!-- /main-container -->
  </div><!-- /app -->

  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "nanostores": "https://cdn.skypack.dev/nanostores"
      }
    }
  </script>

  <!-- Cache Buster v5.5 -->
  <script type="module" src="./static/main.js?v=5.5"></script>
</body>

</html>
