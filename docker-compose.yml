services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - avatar-network

  ollama-init:
    image: ollama/ollama:latest
    networks:
      - avatar-network
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Ollama to be ready...' &&
      MAX_RETRIES=30 &&
      COUNT=0 &&
      until ollama list > /dev/null 2>&1; do
        COUNT=$$((COUNT+1)) &&
        if [ $$COUNT -ge $$MAX_RETRIES ]; then
          echo 'Ollama did not start in time. Exiting.' &&
          exit 1
        fi &&
        sleep 5
      done &&
      echo 'Pulling phi3 model...' &&
      ollama pull phi3 &&
      echo 'Pulling nomic-embed-text model...' &&
      ollama pull nomic-embed-text &&
      echo 'Models are ready!'
      "

  tts-server:
    build: ./tts-server
    ports:
      - "5002:5002"
    environment:
      - AUDIO_PATH=/app/tts-cache
    volumes:
      - tts-cache:/app/tts-cache
      - tts-model-cache:/root/.cache/torch
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5002/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - avatar-network

  whisper-server:
    build: ./whisper-server
    ports:
      - "5003:5003"
    volumes:
      - whisper-cache:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=base
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/health', timeout=3)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - avatar-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pass}
      - POSTGRES_DB=${POSTGRES_DB:-voxentia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d voxentia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - avatar-network

  backend:
    build:
      context: .             
      dockerfile: deployment/docker/backend.Dockerfile 
    ports:
      - "8000:8000"
    environment:
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      - PYTHONPATH=/app/core/src:/app/backend:/app
      - ANONYMIZED_TELEMETRY=False
      - OLLAMA_URL=http://ollama:11434
      - TTS_URL=http://tts-server:5002
      - WHISPER_URL=http://whisper-server:5003
      - DB_PATH=postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@db:5432/${POSTGRES_DB:-voxentia}
      - USER_FINGERPRINT=${USER_FINGERPRINT:-}
    volumes:
      # Runtime data only — plugins/code come from the image (see docker-compose.dev.yml)
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      tts-server:
        condition: service_healthy
      whisper-server:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - avatar-network

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avatar-network

  xtts-server:
    profiles: ["voice-clone"]
    build: ./xtts-server
    ports:
      - "5004:5004"
    volumes:
      - xtts-voices:/app/voices
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - avatar-network

  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_GLOBAL_OPTIONS=auto_https disable_redirects
    command: caddy reverse-proxy --from https://localhost --to http://frontend:80 --internal-certs
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - avatar-network

volumes:
  ollama:
  tts-cache:
  whisper-cache:
  postgres_data:
  xtts-voices:
  tts-model-cache:

networks:
  avatar-network:
    driver: bridge