services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - avatar-network

  tts-server:
    build: ./tts-server
    ports:
      - "5002:5002"
    volumes:
      - tts-cache:/app/tts-cache
    networks:
      - avatar-network

  whisper-server:
    build: ./whisper-server
    ports:
      - "5003:5003"
    volumes:
      - whisper-cache:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=base
    networks:
      - avatar-network

  avatar-server:
    build:
      context: .             
      dockerfile: backend/Dockerfile 
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets 
      - ./frontend:/app/frontend
    depends_on:
      - ollama
      - tts-server
      - whisper-server
    networks:
      - avatar-network

volumes:
  ollama:
  tts-cache:
  whisper-cache:

networks:
  avatar-network:
    driver: bridge