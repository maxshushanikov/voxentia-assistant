name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e core
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check backend/app tests core/src/voxentia/plugins/discovery.py core/src/voxentia/services/llm_client.py core/src/voxentia/orchestrator

      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py

      - name: Pytest
        run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend for OpenAPI export
        working-directory: .
        run: |
          pip install -e core
          pip install -r backend/requirements.txt
          python scripts/export_openapi.py

      - name: Install
        run: npm ci

      - name: Generate API types
        run: npm run generate:api

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
